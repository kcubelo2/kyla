<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>DOCX Preview</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #333333;
            padding: 2rem;
            margin: 0;
            line-height: 1.6;
        }
        /* Add some basic styling for converted docx content */
        h1, h2, h3, h4, h5, h6 {
            color: #2c3e50;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
        }
        p {
            margin-bottom: 1rem;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 1rem;
        }
        table, th, td {
            border: 1px solid #bdc3c7;
        }
        th, td {
            padding: 8px;
            text-align: left;
        }
        img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    {{ html_content|safe }}
</body>
</html>
