{% extends 'base.html' %}

{% block content %}
<div class="card glass" style="max-width: 600px; margin: 2rem auto;">
    <h2 style="text-align: center; margin-bottom: 2rem;">Sign Up</h2>
    
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">I am a...</label>
            <select name="role" id="role-select" class="form-control" required>
                <option value="student">Student</option>
                <option value="teacher">Teacher</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <!-- Student Specific Fields -->
        <div id="student-fields">
            <h3 style="margin: 1.5rem 0 1rem; color: var(--primary);">Enrollment Details</h3>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                <div class="form-group">
                    <label class="form-label">First Name</label>
                    <input type="text" name="first_name" class="form-control student-input">
                </div>
                <div class="form-group">
                    <label class="form-label">Last Name</label>
                    <input type="text" name="last_name" class="form-control student-input">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                <div class="form-group">
                    <label class="form-label">Date of Birth</label>
                    <input type="date" name="date_of_birth" class="form-control student-input">
                </div>
                <div class="form-group">
                    <label class="form-label">Gender</label>
                    <select name="gender" class="form-control student-input">
                        <option value="M">Male</option>
                        <option value="F">Female</option>
                        <option value="O">Other</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Address</label>
                <textarea name="address" class="form-control student-input" style="min-height: 80px;"></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Contact Number</label>
                <input type="text" name="contact_number" class="form-control student-input">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                <div class="form-group">
                    <label class="form-label">Grade Level</label>
                    <input type="text" name="grade_level" class="form-control student-input" placeholder="e.g., Grade 7">
                </div>
                <div class="form-group">
                    <label class="form-label">Previous School</label>
                    <input type="text" name="previous_school" class="form-control student-input">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Upload Credentials (Birth Certificate, Report Card, etc.)</label>
                <input type="file" name="credentials" multiple class="form-control student-input">
                <small style="color: var(--text-secondary); display: block; margin-top: 0.5rem;">You can select multiple files.</small>
            </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
    </form>
    
    <div style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
        Already have an account? <a href="{% url 'login' %}">Log in here</a>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const roleSelect = document.getElementById('role-select');
        const studentFields = document.getElementById('student-fields');
        const studentInputs = document.querySelectorAll('.student-input');
        
        function toggleFields() {
            if (roleSelect.value === 'student') {
                studentFields.style.display = 'block';
                studentInputs.forEach(input => {
                    if (input.name !== 'previous_school' && input.name !== 'credentials') {
                        input.required = true;
                    }
                });
            } else {
                studentFields.style.display = 'none';
                studentInputs.forEach(input => {
                    input.required = false;
                });
            }
        }
        
        roleSelect.addEventListener('change', toggleFields);
        toggleFields(); // Initial run
    });
</script>
{% endblock %}
